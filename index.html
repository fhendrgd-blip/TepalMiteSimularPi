<!DOCTYPE html>
<html>
<head>
    <title>Code Website</title>
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;margin:0;">

<div>
    <input id="code" type="text" placeholder="Enter code">
    <button onclick="checkCode()">Submit</button>
</div>

<script>

// Disable right-click
document.addEventListener("contextmenu", function(event) {
    event.preventDefault();
    alert("NO INSPECT FOR U HAHAHA 😈");
});

function checkCode(){

    let code = document.getElementById("code").value;

    if(code === "ObscureCode"){
        window.location.href = "https://www.youtube.com/watch?v=iDLmYZ5HqgM";
    }

    else if(code === "RandomGuy"){
        window.location.href = "https://www.youtube.com/shorts/ZzBorHRa2SE";
    }

    else{
        alert("Wrong code!");
    }

}

</script>
