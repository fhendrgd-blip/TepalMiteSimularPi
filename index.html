</div>

<script>

    if(code === "ObscureCode"){
        window.location.href = "https://www.youtube.com/watch?v=iDLmYZ5HqgM";
    }
    else if(code === "RandomGuy"){
        window.location.href = "https://www.youtube.com/shorts/ZzBorHRa2SE";
    }
    else if(code === "Banger"){
        window.location.href = "https://www.youtube.com/watch?v=pfZolkBG-4I&list=RDpfZolkBG-4I&start_radio=1";
    }
    
    }
    else{
        alert("Wrong code!");
    }

}
</script>
